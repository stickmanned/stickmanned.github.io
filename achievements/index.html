<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css?v=2" />
    <title>Achievements</title>
  </head>
  <body>
    <a class="site-logo" href="/" aria-label="Home">
      <img src="/img/websitelogo.png" alt="WW Logo" />
    </a>

    <main class="page-main">
      <h1>Achievements</h1>
      <h2>Here are some things that I am proud of:</h2>

      <div class="media-gallery">
        <!-- Each card: image, description, year tag, clickable link -->
        <figure>
          <a
            class="card-link"
            href="#"
            aria-label="Dr. Charles Best Secondary School Honours With Distinction"
          >
            <img
              src="/img/award/honours%20with%20distinctions.JPG"
              alt="Dr. Charles Best Secondary School Honours With Distinction"
              onerror="this.src='/img/placeholder.png'"
            />
            <h4>Dr. Charles Best Secondary School Honours With Distinction</h4>
            <p>
              Received this award after getting A (86%+) in 8+ courses at
              school.
            </p>
            <div class="tag-row">
              <span class="tag">2026</span>
              <span class="tag">School</span>
            </div>
          </a>
        </figure>

        <figure>
          <a
            class="card-link"
            href="https://docs.google.com/document/d/1kXjQNyiscQn2zaWMtxfgl-uwdmnqZ8j-wsJJY0dZCqQ/edit?usp=sharing"
            target="_blank"
            rel="noopener"
            aria-label="Queen's Commonwealth Essay Competition - Gold"
          >
            <img
              src="/img/award/essay.jpg"
              alt="Commonwealth Essay Competition Gold Award"
              onerror="this.src='/img/placeholder.png'"
            />
            <h4>Queen's Commonwealth Essay Competition - Gold</h4>
            <p>
              Recognized for "Small Steps for a Climate Crisis" essay showcasing
              climate action insights.
            </p>
            <div class="tag-row">
              <span class="tag">2024</span>
              <span class="tag">Writing</span>
            </div>
          </a>
        </figure>

        <figure>
          <a class="card-link" href="#" aria-label="Democracy and me">
            <img
              src="/img/award/democracy.jpg"
              alt="Democracy and me"
              onerror="this.src='/img/placeholder.png'"
            />
            <h4>Democracy and me art contest - 1st place</h4>
            <p>
              An art contest about democracy, the world, and us. (1st place
              grade K-4 category)<br />
              Award: Lunch with the speaker of British Columbia
            </p>
            <div class="tag-row">
              <span class="tag">2019</span>
              <span class="tag">Arts</span>
            </div>
          </a>
        </figure>
      </div>
    </main>
  </body>
</html>
